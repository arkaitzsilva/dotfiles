###############
### SOURCES ###
###############
source = $HOME/.config/hypr/keybindings.conf
source = $HOME/.config/hypr/monitors.conf
source = $HOME/.config/hypr/theme.conf


#############
### DEBUG ###
#############
debug {
  disable_logs = false
}


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

exec-once = hyprctl plugin load "$HYPR_PLUGIN_DIR/lib/libhyprfocus.so"
exec-once = awww-daemon --format argb & awww img $HOME/.local/share/backgrounds/animated_cell_2.gif
exec-once = systemctl --user start stasis
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = NIXOS_OZONE_WL,1
env = XDG_CONFIG_HOME,$HOME/.config

env = XCURSOR_THEME,nx-snow
env = XCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

ecosystem {
  no_update_news = true
  no_donation_nag = true
  # enforce_permissions = 1
}

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

general {
  gaps_in = 4
  gaps_out = 8

  border_size = 2

  col.active_border = $active
  col.inactive_border = $inactive

  # Set to true enable resizing windows by clicking and dragging on borders and gaps
  resize_on_border = false

  allow_tearing = false

  layout = "dwindle"
}

decoration {
  rounding = 10

  # Change transparency of focused and unfocused windows
  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = false
    range = 4
    render_power = 3
    color = $shadow
  }

  blur {
    enabled = false
    size = 3
    passes = 1

    vibrancy = 0.1696
  }
}

animations {
  enabled = true

  #        NAME,      X0,   Y0,   X1,   Y1
  bezier = smoothOut, 0.36, 0,    0.66, -0.56
  bezier = smoothIn,  0.25, 1,    0.5,  1
  bezier = overshot,  0.05, 0.9,  0.1,  1.05
  bezier = softSnap,  0.4,  0,    0.2,  1
  bezier = fluent,    0.0,  0.0,  0.2,  1

  #           NAME,             ONOFF, SPEED, CURVE,     [STYLE]
  # Windows
  animation = windows,          1,     5,     overshot,  popin 80%
  animation = windowsIn,        1,     5,     overshot,  popin 80%
  animation = windowsOut,       1,     4,     smoothOut, popin 90%
  animation = windowsMove,      1,     2,     softSnap

  # Layers
  animation = layersIn,         1,     3,     smoothIn,  slide right
  animation = layersOut,        1,     2,     linear,    slide right

  # Fade
  animation = fade,             1,     4,     smoothIn
  animation = fadeIn,           1,     4,     smoothIn
  animation = fadeOut,          1,     4,     smoothIn
  animation = fadeSwitch,       1,     4,     smoothIn
  animation = fadeShadow,       1,     4,     smoothIn
  animation = fadeDim,          1,     4,     smoothIn
  animation = fadeDpms,         1,     4,     smoothIn

  # Workspaces
  animation = workspaces,       1,     6,     overshot,  slidefade 30%
  animation = specialWorkspace, 1,     6,     overshot,  slidefadevert 30%

  # Hyprfocus
  animation = hyprfocusIn,      1,     0.8,   smoothIn
  animation = hyprfocusOut,     1,     0.4,   smoothOut
}

dwindle {
  pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = true # You probably want this
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
  disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

input {
  kb_layout = es
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1

  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

  touchpad {
    natural_scroll = false
  }
}

# Example per-device config
device {
  name = epic-mouse-v1
  sensitivity = -0.5
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = match:class xdg-desktop-portal-gtk, float on, size 800 600, center on

layerrule = animation fade, match:namespace ^awww-daemon$


###########
# PLUGINS #
###########
plugin {
  hyprfocus {
    mode = slide # flash, bounce, slide
    # fade_opacity = 0.90
    # bounce_strength = 0.99
    slide_height = 8
  }
}
