###############
### SOURCES ###
###############
source = $HOME/.config/hypr/keybindings.conf
source = $HOME/.config/hypr/monitors.conf
source = $HOME/.config/hypr/theme.conf


#############
### DEBUG ###
#############
debug {
  disable_logs = false
}


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

exec-once = hyprctl plugin load "$HYPR_PLUGIN_DIR/lib/libhyprfocus.so"
exec-once = awww-daemon --format argb & awww img $HOME/.local/share/backgrounds/animated_cell_2.gif
exec-once = systemctl --user start stasis
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = NIXOS_OZONE_WL,1
env = XDG_CONFIG_HOME,$HOME/.config

env = XCURSOR_THEME,nx-snow
env = XCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

ecosystem {
  no_update_news = true
  no_donation_nag = true
  # enforce_permissions = 1
}

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

general {
  gaps_in = 4
  gaps_out = 8

  border_size = 2
  
  col.active_border = $active1 $active2 $active3 $active4 45deg
  col.inactive_border = $inactive

  # Set to true enable resizing windows by clicking and dragging on borders and gaps
  resize_on_border = false

  allow_tearing = false

  layout = "dwindle"
}

decoration {
  rounding = 10

  # Change transparency of focused and unfocused windows
  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = false
    range = 4
    render_power = 3
    color = $shadow
  }

  blur {
    enabled = false
    size = 3
    passes = 1

    vibrancy = 0.1696
  }
}

animations {
  enabled = true

  bezier = wind, 0.05, 0.85, 0.03, 0.97
  bezier = winIn, 0.07, 0.88, 0.04, 0.99
  bezier = winOut, 0.20, -0.15, 0, 1
  bezier = liner, 1, 1, 1, 1
  bezier = md3_standard, 0.12, 0, 0, 1
  bezier = md3_decel, 0.05, 0.80, 0.10, 0.97
  bezier = md3_accel, 0.20, 0, 0.80, 0.08
  bezier = overshot, 0.05, 0.85, 0.07, 1.04
  bezier = crazyshot, 0.1, 1.22, 0.68, 0.98
  bezier = hyprnostretch, 0.05, 0.82, 0.03, 0.94
  bezier = menu_decel, 0.05, 0.82, 0, 1
  bezier = menu_accel, 0.20, 0, 0.82, 0.10
  bezier = easeInOutCirc, 0.75, 0, 0.15, 1
  bezier = easeOutCirc, 0, 0.48, 0.38, 1
  bezier = easeOutExpo, 0.10, 0.94, 0.23, 0.98
  bezier = softAcDecel, 0.20, 0.20, 0.15, 1
  bezier = md2, 0.30, 0, 0.15, 1
  bezier = OutBack, 0.28, 1.40, 0.58, 1
  bezier = easeInOutCirc, 0.78, 0, 0.15, 1

  animation = border, 1, 1.6, liner
  animation = borderangle, 1, 82, liner, loop
  animation = windowsIn, 1, 3.2, winIn, slide
  animation = windowsOut, 1, 2.8, easeOutCirc
  animation = windowsMove, 1, 3.0, wind, slide
  animation = fade, 1, 1.8, md3_decel
  animation = layersIn, 1, 1.8, menu_decel, slide
  animation = layersOut, 1, 1.5, menu_accel
  animation = fadeLayersIn, 1, 1.6, menu_decel
  animation = fadeLayersOut, 1, 1.8, menu_accel
  animation = workspaces, 1, 5.0, menu_decel, slidefade 15%
  animation = specialWorkspace, 1, 2.3, md3_decel, slidefadevert 15%
}

dwindle {
  pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = true # You probably want this
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
  disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

input {
  kb_layout = es
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1

  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

  touchpad {
    natural_scroll = false
  }
}

# Example per-device config
device {
  name = epic-mouse-v1
  sensitivity = -0.5
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = match:class xdg-desktop-portal-gtk, float on, size 800 600, center on

layerrule = animation fade, match:namespace ^awww-daemon$
